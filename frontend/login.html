<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 扇艺广告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo .icon { font-size: 48px; }

    .logo h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-top: 10px;
      font-weight: bold;
    }

    .logo p {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #e0c97f; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }

    .btn-primary {
      background: #1a1a2e;
      color: #e0c97f;
    }

    .tip {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .tip a {
      color: #1a1a2e;
      font-weight: bold;
      text-decoration: none;
    }

    .tip a:hover { text-decoration: underline; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert-error { background: #ffeaea; color: #d0504a; border: 1px solid #f5c6c6; }
    .alert-success { background: #eafaf1; color: #27ae60; border: 1px solid #b2dfdb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">🪭</div>
      <h1>扇艺广告</h1>
      <p>广告扇子定制平台</p>
    </div>

    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="username" placeholder="请输入账号" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary">登 录</button>
    </form>

    <div class="tip">还没有账号？<a href="register.html">立即注册</a></div>
  </div>

  <script>
    const API = 'http://localhost:5000';

    // 检查是否已登录（token 存在则跳转）
    if (localStorage.getItem('token')) {
      location.href = 'index.html';
    }

    const form       = document.getElementById('loginForm');
    const errorMsg   = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn  = form.querySelector('button[type="submit"]');

    // 注册成功提示
    if (sessionStorage.getItem('registered') === 'true') {
      sessionStorage.removeItem('registered');
      successMsg.textContent  = '注册成功，请登录';
      successMsg.style.display = 'block';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorMsg.textContent  = '请填写账号和密码';
        errorMsg.style.display = 'block';
        return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = '登录中...';

      try {
        const res  = await fetch(`${API}/api/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent  = data.message || '登录失败';
          errorMsg.style.display = 'block';
          return;
        }

        localStorage.setItem('token',       data.token);
        localStorage.setItem('currentUser', data.username);
        location.href = 'index.html';
      } catch {
        errorMsg.textContent  = '无法连接到服务器，请确认后端已启动';
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = '登 录';
      }
    });
  </script>
</body>
</html>

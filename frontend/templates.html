<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设计模板 - 扇艺广告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f6fa;
      color: #333;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== 左侧功能��� ===== */
    .sidebar {
      width: 220px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
    }
    .sidebar-logo {
      padding: 28px 20px 20px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      border-bottom: 1px solid #2a2a4a;
      color: #e0c97f;
      cursor: pointer;
    }
    .sidebar-logo span {
      font-size: 12px; color: #aaa; display: block;
      font-weight: normal; letter-spacing: 1px; margin-top: 4px;
    }
    .sidebar nav { flex: 1; padding: 16px 0; }
    .nav-section-title {
      font-size: 11px; color: #888; letter-spacing: 1px;
      padding: 12px 20px 6px; text-transform: uppercase;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; cursor: pointer; transition: background 0.2s;
      font-size: 14px; border-left: 3px solid transparent;
      text-decoration: none; color: #fff;
    }
    .nav-item:hover { background: #2a2a4a; }
    .nav-item.active { background: #16213e; border-left-color: #e0c97f; color: #e0c97f; }
    .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid #2a2a4a; font-size: 12px; color: #888; }

    /* ===== 主内容区 ===== */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      background: #fff; padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e8e8e8; flex-shrink: 0;
    }
    .topbar-title { font-size: 18px; font-weight: bold; color: #1a1a2e; }
    .topbar-actions { display: flex; gap: 12px; align-items: center; }
    .btn {
      padding: 8px 20px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 14px; font-family: inherit; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e0c97f; color: #1a1a2e; font-weight: bold; }
    .btn-outline { background: transparent; border: 1px solid #ddd; color: #555; }

    .content {
      flex: 1; overflow-y: auto; padding: 28px 32px;
    }

    /* ===== 上传区 ===== */
    .upload-box {
      border: 2px dashed #d0d0d0; border-radius: 12px;
      background: #fff; padding: 40px 20px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 28px;
    }
    .upload-box:hover, .upload-box.drag-over {
      border-color: #e0c97f; background: #fffdf0;
    }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-title { font-size: 16px; font-weight: bold; color: #1a1a2e; margin-bottom: 6px; }
    .upload-hint { font-size: 13px; color: #aaa; line-height: 1.8; }
    .upload-hint strong { color: #e0c97f; }
    #fileInput { display: none; }

    /* 进度条 */
    .upload-progress {
      display: none; margin-top: 16px;
    }
    .progress-bar-wrap {
      background: #f0f0f0; border-radius: 20px; height: 6px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: #e0c97f; border-radius: 20px;
      width: 0; transition: width 0.3s;
    }
    .progress-text { font-size: 12px; color: #888; margin-top: 6px; }

    /* ===== 已上传列表 ===== */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .section-title { font-size: 15px; font-weight: bold; color: #1a1a2e; }
    .template-count { font-size: 13px; color: #aaa; }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .template-card {
      background: #fff; border-radius: 10px; overflow: hidden;
      border: 1px solid #eee;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
    }
    .template-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px);
    }
    .template-card:hover .card-delete { opacity: 1; }

    .card-preview {
      width: 100%; height: 160px;
      background: #f4f4f8;
      overflow: hidden;
    }
    .card-preview img {
      width: 100%; height: 160px;
      object-fit: contain; display: block;
    }
    .card-preview .no-preview {
      width: 100%; height: 160px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: #ccc;
    }

    .card-info { padding: 10px 12px 12px; }
    .card-name {
      font-size: 13px; font-weight: 600; color: #1a1a2e;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-meta { font-size: 11px; color: #aaa; }

    .card-delete {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,0.92); border: none;
      cursor: pointer; opacity: 0; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #e05c5c;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 0; color: #ccc;
    }
    .empty-state .ei { font-size: 52px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <!-- 左侧功能栏 -->
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="location.href='index.html'">
      扇艺广告
      <span>广告扇子定制平台</span>
    </div>
    <nav>
      <div class="nav-section-title">主菜单</div>
      <a class="nav-item" href="index.html"><span class="icon">🏠</span> 首页</a>
      <a class="nav-item active" href="templates.html"><span class="icon">🎨</span> 设计模板</a>
      <a class="nav-item" href="fan-batch-color.html"><span class="icon">🖌️</span> 像素染色</a>
      <a class="nav-item" href="materials.html"><span class="icon">🗂️</span> 材料仓库</a>
      <div class="nav-section-title">设置</div>
      <a class="nav-item" href="#"><span class="icon">⚙️</span> 系统设置</a>
      <a class="nav-item" href="#"><span class="icon">👤</span> 账号管理</a>
    </nav>
    <div class="sidebar-footer">© 2026 扇艺广告</div>
  </aside>

  <!-- 主内容区 -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-title">设计模板</div>
      <div class="topbar-actions">
        <button class="btn btn-outline">联系客服</button>
        <button class="btn btn-primary" id="uploadTriggerBtn">上传模板</button>
        <span id="userLabel" style="font-size:13px;color:#888;margin-left:8px;"></span>
        <button class="btn btn-outline" id="logoutBtn" style="margin-left:4px;">退出</button>
      </div>
    </header>

    <div class="content">

      <!-- 上传区 -->
      <div class="upload-box" id="uploadBox">
        <input type="file" id="fileInput" multiple accept=".png,.jpg,.jpeg,.pdf,.ai,.psd" />
        <div class="upload-icon">📁</div>
        <div class="upload-title">点击或拖拽文件到此处上传</div>
        <div class="upload-hint">
          支持格式：<strong>PNG、JPG、PDF、AI、PSD</strong><br>
          单文件最大 50MB，每次最多上传 10 个文件
        </div>
        <div class="upload-progress" id="uploadProgress">
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="progress-text" id="progressText">上传中...</div>
        </div>
      </div>

      <!-- 已上传列表 -->
      <div class="section-header">
        <div class="section-title">已上传模板</div>
        <span class="template-count" id="templateCount">0 个</span>
      </div>

      <div class="template-grid" id="templateGrid">
        <div class="empty-state">
          <span class="ei">🎨</span>
          <p>暂无上传的模板，点击上方区域开始上传</p>
        </div>
      </div>

    </div>
  </div>

  <script>
const API = 'http://network.ipyingshe.net';
    const token = localStorage.getItem('token');
    if (!token) { location.href = 'login.html'; }
    const currentUser = localStorage.getItem('currentUser');
    if (currentUser) document.getElementById('userLabel').textContent = '你好，' + currentUser;
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('currentUser');
      location.href = 'login.html';
    });

    const uploadBox      = document.getElementById('uploadBox');
    const fileInput      = document.getElementById('fileInput');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressBar    = document.getElementById('progressBar');
    const progressText   = document.getElementById('progressText');

    // 点击上传框 或 顶部按钮 均触发文件选择
    uploadBox.addEventListener('click', () => fileInput.click());
    document.getElementById('uploadTriggerBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      fileInput.click();
    });

    // 拖拽
    uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag-over'); });
    uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag-over'));
    uploadBox.addEventListener('drop', e => {
      e.preventDefault();
      uploadBox.classList.remove('drag-over');
      if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFiles(fileInput.files);
    });

    async function uploadFiles(files) {
      const formData = new FormData();
      Array.from(files).forEach(f => formData.append('files', f));

      uploadProgress.style.display = 'block';
      progressBar.style.width = '30%';
      progressText.textContent = `正在上传 ${files.length} 个文件...`;

      try {
        const res = await fetch(`${API}/api/templates/upload`, {
          method:  'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body:    formData
        });
        if (res.status === 401) { location.href = 'login.html'; return; }
        const data = await res.json();
        progressBar.style.width = '100%';
        progressText.textContent = res.ok ? `上传成功！共 ${data.files.length} 个文件` : (data.message || '上传失败');
        if (res.ok) {
          data.files.forEach(f => prependCard(f));
        }
      } catch {
        progressText.textContent = '上传失败，请检查后端服务';
      } finally {
        fileInput.value = '';
        setTimeout(() => {
          uploadProgress.style.display = 'none';
          progressBar.style.width = '0';
        }, 2500);
      }
    }

    // ===== 卡片相关 =====
    const PREVIEW_TYPES = ['.png', '.jpg', '.jpeg'];

    function buildCard(tpl) {
      const ext = tpl.name.substring(tpl.name.lastIndexOf('.')).toLowerCase();
      const canPreview = PREVIEW_TYPES.includes(ext);
      const size = tpl.size < 1024 * 1024
        ? (tpl.size / 1024).toFixed(1) + ' KB'
        : (tpl.size / 1024 / 1024).toFixed(1) + ' MB';
      const d = new Date(tpl.uploadedAt);
      const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;

      const card = document.createElement('div');
      card.className  = 'template-card';
      card.dataset.id = tpl.id;
      card.innerHTML = `
        <div class="card-preview">
          ${canPreview
            ? `<img src="${tpl.url}" alt="${tpl.name}" loading="lazy">`
            : `<div class="no-preview">${ext === '.pdf' ? '📄' : ext === '.psd' ? '🖼️' : '📎'}</div>`
          }
        </div>
        <div class="card-info">
          <div class="card-name" title="${tpl.name}">${tpl.name}</div>
          <div class="card-meta">${size} · ${dateStr}</div>
        </div>
        <button class="card-delete" title="删除">×</button>
      `;
      card.querySelector('.card-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`确定删除「${tpl.name}」？`)) return;
        const r = await fetch(`${API}/api/templates/${tpl.id}`, {
          method:  'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (r.ok) { card.remove(); updateCount(); }
      });

      return card;
    }

    function prependCard(tpl) {
      const grid  = document.getElementById('templateGrid');
      const empty = grid.querySelector('.empty-state');
      if (empty) empty.remove();
      grid.prepend(buildCard(tpl));
      updateCount();
    }

    function updateCount() {
      const n = document.querySelectorAll('.template-card').length;
      document.getElementById('templateCount').textContent = n + ' 个';
      if (n === 0) {
        document.getElementById('templateGrid').innerHTML =
          '<div class="empty-state"><span class="ei">🎨</span><p>暂无上传的模板，点击上方区域开始上传</p></div>';
      }
    }

    async function loadTemplates() {
      try {
        const res = await fetch(`${API}/api/templates`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { location.href = 'login.html'; return; }
        const list = await res.json();
        if (list.length === 0) return;
        const grid = document.getElementById('templateGrid');
        grid.innerHTML = '';
        list.forEach(t => grid.appendChild(buildCard(t)));
        updateCount();
      } catch {}
    }

    loadTemplates();
  </script>
</body>
</html>

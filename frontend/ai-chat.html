<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 助手 - 扇艺广告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f6fa;
      color: #333;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== 过期 / 无效遮罩 ===== */
    .gate-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .gate-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .gate-icon { font-size: 56px; margin-bottom: 16px; }

    .gate-title {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    .gate-desc {
      font-size: 14px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .gate-btn {
      display: inline-block;
      background: #e0c97f;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 14px;
      padding: 10px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-family: inherit;
      border: none;
      cursor: pointer;
    }

    /* 顶部剩余时间条 */
    .time-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      color: #e0c97f;
      font-size: 13px;
      text-align: center;
      padding: 6px 0;
      z-index: 100;
    }

    .time-bar .tb-remain {
      font-weight: bold;
      font-variant-numeric: tabular-nums;
    }

    body.has-timebar { padding-top: 32px; }

    /* ===== AI 页面布局 ===== */
    .ai-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 24px;
      gap: 24px;
    }

    /* 左侧 AI 介绍 */
    .ai-intro {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ai-avatar-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      color: #fff;
    }

    .ai-avatar {
      width: 80px;
      height: 80px;
      background: rgba(224, 201, 127, 0.15);
      border: 2px solid #e0c97f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 16px;
    }

    .ai-name {
      font-size: 18px;
      font-weight: bold;
      color: #e0c97f;
      margin-bottom: 6px;
    }

    .ai-tagline {
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }

    .ai-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 12px;
      color: #4ecdc4;
    }

    .ai-status-dot {
      width: 7px;
      height: 7px;
      background: #4ecdc4;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .ai-features {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
    }

    .ai-features-title {
      font-size: 13px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .feature-item:last-child { border-bottom: none; }

    .feature-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .feature-text { color: #555; line-height: 1.5; }
    .feature-text strong { color: #1a1a2e; display: block; margin-bottom: 2px; }

    .quick-prompts {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
    }

    .quick-prompts-title {
      font-size: 13px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .quick-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      color: #444;
      cursor: pointer;
      margin-bottom: 8px;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }

    .quick-btn:last-child { margin-bottom: 0; }

    .quick-btn:hover {
      background: #fff8e6;
      border-color: #e0c97f;
      color: #1a1a2e;
    }

    /* 右侧对话框 */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #e0c97f, #c9a227);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .chat-header-info { flex: 1; }

    .chat-header-name {
      font-size: 15px;
      font-weight: bold;
      color: #1a1a2e;
    }

    .chat-header-desc {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }

    .chat-clear-btn {
      background: transparent;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      color: #999;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .chat-clear-btn:hover { border-color: #e0c97f; color: #1a1a2e; }

    /* 消息列表 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 80%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, #e0c97f, #c9a227);
    }

    .msg.user .msg-avatar {
      background: linear-gradient(135deg, #a1c4fd, #6f96e8);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg.ai .msg-bubble {
      background: #f5f6fa;
      color: #333;
      border-top-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      border-top-right-radius: 4px;
    }

    .msg-time {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
      text-align: right;
    }

    .msg.ai .msg-time { text-align: left; }

    /* 欢迎消息 */
    .welcome-msg {
      text-align: center;
      padding: 32px 16px;
      color: #bbb;
      font-size: 13px;
    }

    .welcome-msg .big-icon { font-size: 48px; margin-bottom: 12px; }
    .welcome-msg p { line-height: 1.8; }

    /* 打字动画 */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: #f5f6fa;
      border-radius: 12px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-5px); opacity: 1; }
    }

    /* 输入区 */
    .chat-input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid #f0f0f0;
    }

    .chat-input-box {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }

    .chat-input-box:focus-within { border-color: #e0c97f; }

    .chat-textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      outline: none;
      max-height: 120px;
      line-height: 1.6;
    }

    .chat-textarea::placeholder { color: #bbb; }

    .send-btn {
      width: 36px;
      height: 36px;
      background: #e0c97f;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover { background: #c9a227; }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { background: #ddd; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: #ccc;
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="ai-body">

      <!-- 左侧介绍 -->
      <div class="ai-intro">

        <div class="ai-avatar-card">
          <div class="ai-avatar">🤖</div>
          <div class="ai-name">扇小艺</div>
          <div class="ai-tagline">扇艺广告专属 AI 助手<br>为您提供定制咨询服务</div>
          <div class="ai-status">
            <div class="ai-status-dot"></div>
            在线服务中
          </div>
        </div>

        <div class="ai-features">
          <div class="ai-features-title">能力介绍</div>
          <div class="feature-item">
            <div class="feature-icon">🪭</div>
            <div class="feature-text">
              <strong>产品咨询</strong>
              折扇、圆扇、竹扇等款式选型建议
            </div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">🎨</div>
            <div class="feature-text">
              <strong>设计指导</strong>
              LOGO 排版、色彩搭配、印刷工艺建议
            </div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">📦</div>
            <div class="feature-text">
              <strong>订单协助</strong>
              起订量、价格、交期等常见问题解答
            </div>
          </div>
          <div class="feature-item">
            <div class="feature-icon">💡</div>
            <div class="feature-text">
              <strong>营销建议</strong>
              广告扇子投放策略与活动方案参考
            </div>
          </div>
        </div>

        <div class="quick-prompts">
          <div class="quick-prompts-title">快速提问</div>
          <button class="quick-btn" onclick="sendQuick(this)">折扇和圆扇有什么区别？</button>
          <button class="quick-btn" onclick="sendQuick(this)">最低起订量是多少？</button>
          <button class="quick-btn" onclick="sendQuick(this)">如何上传我的 LOGO？</button>
          <button class="quick-btn" onclick="sendQuick(this)">一般多久可以交货？</button>
        </div>

      </div>

      <!-- 右侧对话框 -->
      <div class="chat-panel">

        <div class="chat-header">
          <div class="chat-header-avatar">🪭</div>
          <div class="chat-header-info">
            <div class="chat-header-name">扇小艺 · AI 助手</div>
            <div class="chat-header-desc">有任何关于广告扇子定制的问题，都可以问我</div>
          </div>
          <button class="chat-clear-btn" onclick="clearChat()">清空对话</button>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="welcome-msg" id="welcomeMsg">
            <div class="big-icon">🪭</div>
            <p>你好！我是<strong style="color:#1a1a2e;">扇小艺</strong>，扇艺广告的专属 AI 助手。<br>
            无论是产品选型、设计建议还是下单流程，随时为您解答。</p>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="chat-input-box">
            <textarea
              class="chat-textarea"
              id="chatInput"
              placeholder="输入您的问题，例如：折扇定制需要提供哪些文件？"
              rows="1"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
          </div>
          <div class="input-hint">按 Enter 发送 · Shift+Enter 换行</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000';
    const urlToken = new URLSearchParams(location.search).get('token');
    let sessionInfo = null;
    let expireTimer = null;

    // ===== Token 验证入口 =====
    async function initPage() {
      if (!urlToken) {
        showGate('no-token');
        return;
      }

      try {
        const res  = await fetch(`${API}/api/ai-link/verify/${urlToken}`);
        const data = await res.json();

        if (!res.ok || !data.valid) {
          showGate(res.status === 410 ? 'expired' : 'invalid');
          return;
        }

        sessionInfo = data;

        if (data.limitType === 'count') {
          if (data.remainingCount === 0) {
            showGate('exhausted');
            return;
          }
          startCountBar(data.remainingCount);
        } else {
          startTimeBar(data.remainingSeconds, urlToken);
        }

      } catch {
        showGate('error');
      }
    }

    function showGate(type) {
      const configs = {
        'no-token': {
          icon: '🔒',
          title: '需要专属链接才能访问',
          desc:  '请前往首页填写定制需求，生成您的专属 AI 咨询限时链接后再访问。',
        },
        'expired': {
          icon: '⏰',
          title: '链接已过期',
          desc:  '您的 AI 咨询通道已到期关闭。请返回首页重新生成专属链接（有效期 30 分钟）。',
        },
        'invalid': {
          icon: '❌',
          title: '链接无效',
          desc:  '该链接不存在或已被撤销。请返回首页重新生成。',
        },
        'exhausted': {
          icon: '💬',
          title: '对话次数已用完',
          desc:  '您本次的 AI 咨询次数已全部使用完毕。如需继续咨询，请返回首页重新生成含更多次数的专属链接。',
        },
        'error': {
          icon: '⚠️',
          title: '服务暂时不可用',
          desc:  '无法连接到服务器，请稍后刷新重试。',
        },
      };
      const c = configs[type] || configs['invalid'];

      const overlay = document.createElement('div');
      overlay.className = 'gate-overlay';
      overlay.innerHTML = `
        <div class="gate-card">
          <div class="gate-icon">${c.icon}</div>
          <div class="gate-title">${c.title}</div>
          <div class="gate-desc">${c.desc}</div>
          <a class="gate-btn" href="index.html">返回首页</a>
        </div>
      `;
      document.body.appendChild(overlay);

      // 禁用输入
      const inp = document.getElementById('chatInput');
      const btn = document.getElementById('sendBtn');
      if (inp) inp.disabled = true;
      if (btn) btn.disabled = true;
    }

    function startCountBar(count) {
      document.body.classList.add('has-timebar');
      const bar = document.createElement('div');
      bar.className = 'time-bar';
      bar.id = 'timeBar';
      document.body.prepend(bar);
      sessionInfo.remainingCount = count;

      function renderBar(n) {
        bar.innerHTML = `🪭 扇小艺 AI 咨询通道 &nbsp;|&nbsp; 剩余对话次数：<span class="tb-remain">${n} 次</span>`;
      }
      renderBar(count);
    }

    function startTimeBar(seconds, urlToken) {
      document.body.classList.add('has-timebar');

      const bar = document.createElement('div');
      bar.className = 'time-bar';
      bar.id = 'timeBar';
      document.body.prepend(bar);

      let remaining = seconds;

      function renderBar() {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        bar.innerHTML = `🪭 扇小艺 AI 咨询通道 &nbsp;|&nbsp; 剩余有效时间：<span class="tb-remain">${m}:${s}</span>`;
      }

      renderBar();
      expireTimer = setInterval(async () => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(expireTimer);
          bar.innerHTML = '⏰ 咨询通道已到期，请返回首页重新生成链接';
          bar.style.background = '#e05c5c';
          bar.style.color = '#fff';
          showGate('expired');
          return;
        }
        // 每分钟向后端确认一次 token 仍有效
        if (remaining % 60 === 0) {
          try {
            const r = await fetch(`${API}/api/ai-link/verify/${urlToken}`);
            if (!r.ok) { clearInterval(expireTimer); showGate('expired'); return; }
          } catch { /* 网络抖动，不中断 */ }
        }
        renderBar();
      }, 1000);
    }

    initPage();

    // ===== 扇子定制知识库（本地回复）=====
    const KB = [
      {
        keys: ['折扇', '圆扇', '区别', '款式', '种类', '类型'],
        reply: '我们主要提供三大款式：\n\n🪭 **折扇** — 可折叠收纳，携带方便，适合高档礼品或文化活动，印刷面积大、展示效果佳。\n\n⭕ **圆扇（宫扇）** — 造型典雅，适合婚庆、节庆场合，形状有圆形、桃形等多种选择。\n\n🎋 **竹扇** — 采用天然竹材，环保清新，适合茶道、旅游纪念品等场景。\n\n需要了解某款式的具体规格或价格吗？'
      },
      {
        keys: ['起订', '最低', '数量', '多少个', '多少把'],
        reply: '我们的起订量政策如下：\n\n📦 折扇：最低起订 **100 把**\n📦 圆扇：最低起订 **200 把**\n📦 竹扇：最低起订 **100 把**\n\n数量越多，单价越优惠。100 把以下也可联系客服协商小批量定制方案。'
      },
      {
        keys: ['logo', 'LOGO', '图案', '上传', '文件', '格式', '素材'],
        reply: '上传设计文件非常简单！\n\n✅ 支持格式：**AI、PDF、PNG、JPG**（推荐 AI 或高清 PNG）\n✅ 分辨率：建议 **300 DPI 以上**，确保印刷清晰\n✅ 颜色模式：建议使用 **CMYK** 模式\n\n您可以在「在线定制」页面直接上传文件，或将文件发给客服，由我们的设计师协助排版。'
      },
      {
        keys: ['交���', '发货', '多久', '时间', '周期', '几天', '几周'],
        reply: '我们的生产与交货周期：\n\n⏱ **打样**：3–5 个工作日（首次合作建议先打样确认效果）\n⏱ **大货生产**：7–15 个工作日（根据数量和工艺而定）\n🚚 **发货方式**：顺丰/京东快递，全国大部分地区 1–3 天送达\n\n如有紧急需求，可与客服沟通加急方案。'
      },
      {
        keys: ['价格', '多少钱', '报价', '费用', '收费'],
        reply: '价格根据款式、数量、工艺有所不同，以下是参考区间：\n\n💰 折扇（100 把起）：**3–15 元/把**\n💰 圆扇（200 把起）：**2–8 元/把**\n💰 竹扇（100 把起）：**5–20 元/把**\n\n具体报价需根据您的设计要求和定制数量确认。欢迎联系客服获取精准报价单！'
      },
      {
        keys: ['印刷', '工艺', '丝印', '热转印', '烫金'],
        reply: '我们支持多种印刷工艺：\n\n🖨 **丝网印刷** — 色彩鲜艳、耐久性强，适合简单图案和文字\n🌈 **热转印** — 支持全彩渐变、照片级印刷，色彩还原度高\n✨ **烫金/烫银** — 高端质感，适合品牌 LOGO 或文字突出展示\n🎨 **UV 彩印** — 精度最高，适合复杂图案\n\n不同工艺价格不同，可根据预算和效果需求选择。'
      },
      {
        keys: ['营销', '活动', '促销', '礼品', '宣传', '推广'],
        reply: '广告扇子是夏季最高性价比的营销礼品之一，以下是一些投放建议：\n\n🎯 **商圈/社区派发** — 户外高温时期，扇子接受率极高\n🎯 **活动伴手礼** — 婚庆、开业、展会等场合，既实用又有品牌曝光\n🎯 **终端陈列搭配** — 餐厅、超市入口摆放，自然带走即是传播\n🎯 **节日礼品套装** — 结合端午、中秋等节点做主题定制\n\n需要为您的具体活动场景出一份方案吗？'
      }
    ];

    function getReply(text) {
      const t = text.toLowerCase();
      for (const item of KB) {
        if (item.keys.some(k => t.includes(k.toLowerCase()))) {
          return item.reply;
        }
      }
      return '感谢您的提问！关于"' + text.slice(0, 20) + (text.length > 20 ? '…' : '') + '"，我建议您联系我们的专属客服获取更详细的解答。\n\n📞 客服热线：400-XXX-XXXX\n📧 邮箱：service@shanyi.com\n\n或者您可以尝试在左侧「快速提问」中选择常见问题，我会为您详细解答。';
    }

    // ===== 渲染 =====
    function formatTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function renderMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function appendMsg(role, text) {
      const box = document.getElementById('chatMessages');
      const welcome = document.getElementById('welcomeMsg');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = 'msg ' + role;

      const avatarChar = role === 'ai' ? '🪭' : '👤';
      const bubbleContent = role === 'ai' ? renderMarkdown(text) : escapeHtml(text).replace(/\n/g,'<br>');

      div.innerHTML = `
        <div class="msg-avatar">${avatarChar}</div>
        <div>
          <div class="msg-bubble">${bubbleContent}</div>
          <div class="msg-time">${formatTime()}</div>
        </div>
      `;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showTyping() {
      const box = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg ai';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar">🪭</div>
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      // 次数模式：发送前先消耗一次
      let countExhausted = false;
      if (sessionInfo && sessionInfo.limitType === 'count') {
        try {
          const r  = await fetch(`${API}/api/ai-link/${urlToken}/consume`, { method: 'POST' });
          const cd = await r.json();
          if (!cd.allowed) {
            showGate('exhausted');
            return;
          }
          sessionInfo.remainingCount = cd.remainingCount;
          const bar = document.getElementById('timeBar');
          if (bar) bar.innerHTML = `🪭 扇小艺 AI 咨询通道 &nbsp;|&nbsp; 剩余对话次数：<span class="tb-remain">${cd.remainingCount} 次</span>`;
          countExhausted = cd.exhausted;
        } catch {
          showGate('error');
          return;
        }
      }

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;

      appendMsg('user', text);
      showTyping();

      await new Promise(r => setTimeout(r, 800 + Math.random() * 600));

      hideTyping();
      appendMsg('ai', getReply(text));

      if (countExhausted) {
        // 次数耗尽时 AI 追加提示消息
        await new Promise(r => setTimeout(r, 400));
        appendMsg('ai', '您的对话次数已用完，请重新充值后继续使用。感谢您的支持！');
        const bar = document.getElementById('timeBar');
        if (bar) {
          bar.innerHTML = '💬 对话次数已用完，请返回首页重新生成链接';
          bar.style.background = '#e05c5c';
          bar.style.color = '#fff';
        }
        document.getElementById('chatInput').disabled = true;
        document.getElementById('sendBtn').disabled   = true;
      } else {
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function sendQuick(btn) {
      document.getElementById('chatInput').value = btn.textContent;
      sendMessage();
    }

    function clearChat() {
      const box = document.getElementById('chatMessages');
      box.innerHTML = `
        <div class="welcome-msg" id="welcomeMsg">
          <div class="big-icon">🪭</div>
          <p>你好！我是<strong style="color:#1a1a2e;">扇小艺</strong>，扇艺广告的专属 AI 助手。<br>
          无论是产品选型、设计建议还是下单流程，随时为您解答。</p>
        </div>
      `;
    }

    // 输入框自适应高度 & Enter 发送
    const textarea = document.getElementById('chatInput');
    textarea.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    textarea.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
